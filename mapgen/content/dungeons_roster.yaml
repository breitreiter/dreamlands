# Dungeon Roster - Machine-readable source of truth
#
# This file is the canonical data source for all dungeons.
# - mapgen uses: id, biome, decal for placement
# - game client uses: id, folder for encounter loading
# - both use: tier_range for distance-based placement
#
# See mapgen/reference/dungeon_roster.md for full design docs and descriptions

