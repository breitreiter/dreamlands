<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Traverse Prototype</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Alegreya:ital,wght@0,400;0,700;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Alegreya', serif;
    background: #1a1a1a;
    color: #d4c5a9;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }

  #game { max-width: 660px; width: 100%; }

  h1 { text-align: center; color: #D0925D; font-size: 28px; margin-bottom: 8px; }
  .subtitle { text-align: center; color: #8a7a5a; font-style: italic; margin-bottom: 24px; }

  /* Stats */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .stat {
    background: #2a2520;
    border: 1px solid #3a3530;
    border-radius: 6px;
    padding: 10px 8px;
    text-align: center;
  }

  .stat-label {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #8a7a5a;
    margin-bottom: 4px;
  }

  .stat-value { font-size: 28px; font-weight: 700; }
  .stat-momentum .stat-value { color: #e8a840; }
  .stat-spirits .stat-value { color: #6a9fd8; }
  .stat-resistance .stat-value { color: #c85a5a; }

  /* Timers */
  .timers-section { margin-bottom: 16px; }

  .timer {
    background: #2a2025;
    border: 1px solid #5a3535;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .timer.stopped {
    opacity: 0.3;
    border-color: #3a3530;
  }

  .timer-left { flex: 1; }

  .timer-name { font-weight: 700; color: #c85a5a; }
  .timer.stopped .timer-name { color: #5a8a5a; text-decoration: line-through; }
  .timer-effect { font-size: 14px; color: #8a6a5a; }

  .timer-countdown { display: flex; gap: 4px; align-items: center; }

  .timer-pip {
    width: 14px; height: 14px;
    border-radius: 50%;
    border: 2px solid #c85a5a;
    background: transparent;
  }

  .timer-pip.filled { background: #c85a5a; }
  .timer.stopped .timer-pip { border-color: #5a8a5a; background: #5a8a5a; }

  /* Queue */
  .queue-section { margin-bottom: 16px; }

  .queue-card {
    background: #2a2820;
    border: 1px solid #3a3530;
    border-radius: 6px;
    padding: 10px 14px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: all 0.15s;
  }

  .queue-card.current {
    border-color: #e8a840;
    background: #35301e;
  }

  .queue-card.future {
    opacity: 0.55;
  }

  .queue-card.taken {
    opacity: 0.2;
    border-color: #3a3530;
  }

  .queue-pos {
    font-size: 13px;
    color: #5a5040;
    min-width: 20px;
    text-align: center;
  }

  .queue-card.current .queue-pos { color: #e8a840; font-weight: 700; }

  .queue-info { flex: 1; }

  .queue-name { font-weight: 700; color: #e8a840; }
  .queue-card.future .queue-name { color: #a08a50; }

  .queue-detail {
    font-size: 14px;
    display: flex;
    gap: 16px;
    margin-top: 2px;
  }

  .queue-cost { color: #c85a5a; }
  .queue-effect { color: #5aaa5a; }
  .queue-card.future .queue-cost { color: #8a5a4a; }
  .queue-card.future .queue-effect { color: #4a7a4a; }

  .queue-card button {
    flex: none;
    width: auto;
    padding: 6px 14px;
    font-size: 14px;
  }

  .queue-label-current {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #e8a840;
    margin-bottom: 2px;
  }

  .queue-label-upcoming {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: #5a5040;
    margin-top: 8px;
    margin-bottom: 2px;
  }

  /* Log */
  .log {
    background: #22201c;
    border: 1px solid #3a3530;
    border-radius: 6px;
    padding: 16px;
    margin-bottom: 16px;
    min-height: 80px;
    max-height: 240px;
    overflow-y: auto;
  }

  .log-entry { margin-bottom: 6px; line-height: 1.5; }
  .log-entry:last-child { margin-bottom: 0; }
  .log-action { color: #D0925D; font-weight: 700; }
  .log-success { color: #5aaa5a; }
  .log-fail { color: #c85a5a; }
  .log-info { color: #8a7a5a; font-style: italic; }
  .log-timer { color: #c85a5a; font-weight: 700; }
  .log-ending { color: #D0925D; font-size: 18px; font-weight: 700; }

  /* Buttons */
  .actions { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .action-row { display: flex; gap: 8px; }

  button {
    font-family: 'Alegreya', serif;
    font-size: 16px;
    padding: 10px 16px;
    border: 1px solid #3a3530;
    border-radius: 6px;
    background: #2a2520;
    color: #d4c5a9;
    cursor: pointer;
    transition: all 0.15s;
    flex: 1;
  }

  button:hover:not(:disabled) {
    background: #3a3530;
    border-color: #D0925D;
    color: #D0925D;
  }

  button:disabled { opacity: 0.35; cursor: not-allowed; }

  button.primary {
    background: #D0925D;
    color: #1a1a1a;
    border-color: #D0925D;
    font-weight: 700;
  }

  button.primary:hover:not(:disabled) {
    background: #e0a26d;
    color: #1a1a1a;
  }

  .section-label {
    color: #8a7a5a;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .turn-counter {
    text-align: center;
    color: #5a5040;
    font-size: 14px;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
<div id="game"></div>
<script>
// --- Data ---

const TIMER_TEMPLATES = [
  { name: "Crumbling ledge",  effect: "spirits",    amount: 2, countdown: 4 },
  { name: "Rising water",     effect: "spirits",    amount: 1, countdown: 3 },
  { name: "Biting cold",      effect: "spirits",    amount: 1, countdown: 4 },
  { name: "Shifting terrain", effect: "resistance", amount: 2, countdown: 5 },
  { name: "Landslide",        effect: "resistance", amount: 1, countdown: 4 },
  { name: "Thinning air",     effect: "spirits",    amount: 2, countdown: 5 },
  { name: "Loose scree",      effect: "spirits",    amount: 1, countdown: 3 },
  { name: "Closing fog",      effect: "spirits",    amount: 2, countdown: 6 },
];

const OPENING_NAMES = [
  "Narrow ledge", "Fallen trunk", "Dry riverbed", "Root bridge",
  "Sheltered hollow", "Rocky outcrop", "Game trail", "Wind gap",
  "Mossy stones", "Rope remnant", "Ice shelf", "Mud flat",
  "Gravel slide", "Overhang", "Shallow ford", "Chimney crack",
];

const DIFFICULTIES = [
  { id: "easy",   label: "Easy",   desc: "Mom 3 / Res 6 / 2 hazards / 6 deep",   mom: 3, res: 6, timers: 2, depth: 6 },
  { id: "medium", label: "Medium", desc: "Mom 2 / Res 8 / 3 hazards / 5 deep",   mom: 2, res: 8, timers: 3, depth: 5 },
  { id: "hard",   label: "Hard",   desc: "Mom 0 / Res 10 / 4 hazards / 4 deep",  mom: 0, res: 10, timers: 4, depth: 4 },
];

// --- Utilities ---

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickN(arr, n) {
  const copy = [...arr];
  const out = [];
  for (let i = 0; i < n && copy.length; i++) {
    const idx = Math.floor(Math.random() * copy.length);
    out.push(copy.splice(idx, 1)[0]);
  }
  return out;
}

const $ = sel => document.querySelector(sel);
const el = (tag, cls, html) => {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
};

let state = null;

// --- Opening generation ---

function generateOpening() {
  const name = pick(OPENING_NAMES);

  const costRoll = Math.random();
  let cost;
  if (costRoll < 0.30)      cost = { type: "mom", amount: pick([1, 2, 2, 3]) };
  else if (costRoll < 0.55)  cost = { type: "spirits", amount: pick([1, 1, 2]) };
  else if (costRoll < 0.80)  cost = { type: "tick", amount: 1 };
  else                        cost = { type: "free", amount: 0 };

  const hasActiveTimers = state.timers.some(t => !t.stopped);
  const effectRoll = Math.random();
  let effect;
  if (effectRoll < 0.30)
    effect = { type: "momentum", amount: pick([2, 3]) };
  else if (effectRoll < 0.60 && hasActiveTimers)
    effect = { type: "stop_timer", amount: 1 };
  else
    effect = { type: "resistance", amount: pick([2, 2, 3]) };

  return { name, cost, effect };
}

function costLabel(cost) {
  switch (cost.type) {
    case "mom": return `Costs ${cost.amount} Mom`;
    case "spirits": return `Costs ${cost.amount} Spr`;
    case "tick": return "Ticks a hazard";
    case "free": return "Free";
  }
}

function effectLabel(effect) {
  switch (effect.type) {
    case "momentum": return `+${effect.amount} Momentum`;
    case "stop_timer": return "Stop a hazard";
    case "resistance": return `-${effect.amount} Resistance`;
  }
}

function canAfford(opening) {
  const c = opening.cost;
  if (c.type === "free") return true;
  if (c.type === "mom") return state.momentum >= c.amount;
  if (c.type === "spirits") return state.spirits >= c.amount;
  if (c.type === "tick") return state.timers.some(t => !t.stopped);
  return false;
}

// --- Timer helpers ---

function makeTimers(count) {
  return pickN(TIMER_TEMPLATES, count).map(t => ({
    ...t,
    current: t.countdown,
    stopped: false,
  }));
}

function tickTimers() {
  for (const t of state.timers) {
    if (t.stopped) continue;
    t.current--;
    if (t.current <= 0) {
      if (t.effect === "spirits") {
        state.spirits = Math.max(0, state.spirits - t.amount);
        log("timer", `${t.name}! -${t.amount} Spirits.`);
      } else if (t.effect === "resistance") {
        state.resistance += t.amount;
        log("timer", `${t.name}! +${t.amount} Resistance.`);
      }
      t.current = t.countdown;
    }
  }
}

function stopOneTimer() {
  const active = state.timers.filter(t => !t.stopped);
  if (!active.length) return;
  active.sort((a, b) => a.current - b.current);
  const target = active[0];
  target.stopped = true;
  log("success", `Hazard neutralized: ${target.name}.`);
}

function tickOneTimer() {
  const active = state.timers.filter(t => !t.stopped);
  if (!active.length) return;
  const target = pick(active);
  target.current--;
  log("fail", `Hazard advanced: ${target.name} (${target.current} left).`);
  if (target.current <= 0) {
    if (target.effect === "spirits") {
      state.spirits = Math.max(0, state.spirits - target.amount);
      log("timer", `${target.name}! -${target.amount} Spirits.`);
    } else if (target.effect === "resistance") {
      state.resistance += target.amount;
      log("timer", `${target.name}! +${target.amount} Resistance.`);
    }
    target.current = target.countdown;
  }
}

// --- Queue helpers ---

function fillQueue() {
  while (state.queue.length < state.queueDepth) {
    state.queue.push(generateOpening());
  }
}

// --- Game flow ---

function newGame() {
  state = { phase: "setup", log: [] };
  render();
}

function startTraverse(diff) {
  state.momentum = diff.mom;
  state.spirits = 10;
  state.resistance = diff.res;
  state.turn = 0;
  state.queueDepth = diff.depth;
  state.queue = [];
  state.nextBonus = 0;
  state.bonusOpenings = null;
  state.timers = makeTimers(diff.timers);
  state.log = [];

  log("info", `You survey the path ahead. ${diff.timers} hazards, ${diff.depth} steps visible.`);

  fillQueue();
  beginTurn();
}

function beginTurn() {
  state.phase = "play";
  state.turn++;
  state.momentum += 1;

  if (state.turn > 1) {
    log("info", `--- Turn ${state.turn} ---`);
  }

  tickTimers();
  if (checkEndings()) return;

  log("info", "+1 Momentum.");

  // generate bonus openings if earned last turn
  if (state.nextBonus > 0) {
    state.bonusOpenings = [];
    for (let i = 0; i < state.nextBonus; i++) state.bonusOpenings.push(generateOpening());
    state.nextBonus = 0;
  }

  // refill queue to depth (new openings appear at the back)
  fillQueue();

  render();
}

function doPress() {
  if (state.momentum < 2) return;
  state.momentum -= 2;
  state.nextBonus = 3;
  log("action", "Press the Advantage — burn 2 Momentum. Next turn: 3 openings.");
  beginTurn();
}

function doForce() {
  if (state.spirits < 2) return;
  state.spirits -= 2;
  state.nextBonus = 3;
  log("action", "Force an Opening — burn 2 Spirits. Next turn: 3 openings.");
  beginTurn();
}

function applyOpening(o) {
  // pay cost
  switch (o.cost.type) {
    case "mom": state.momentum -= o.cost.amount; break;
    case "spirits": state.spirits -= o.cost.amount; break;
    case "tick": tickOneTimer(); break;
  }

  // apply effect
  switch (o.effect.type) {
    case "momentum":
      state.momentum += o.effect.amount;
      log("success", `${o.name}: +${o.effect.amount} Momentum.`);
      break;
    case "stop_timer":
      log("action", `${o.name}: neutralize a hazard.`);
      stopOneTimer();
      break;
    case "resistance":
      state.resistance = Math.max(0, state.resistance - o.effect.amount);
      log("success", `${o.name}: -${o.effect.amount} Resistance.`);
      break;
  }
}

function takeFront() {
  const o = state.queue[0];
  if (!canAfford(o)) return;

  applyOpening(o);
  state.queue.shift();

  if (checkEndings()) return;
  beginTurn();
}

function takeBonusOpening(idx) {
  const o = state.bonusOpenings[idx];
  if (!canAfford(o)) return;

  applyOpening(o);
  state.bonusOpenings = null;

  if (checkEndings()) return;
  beginTurn();
}

function checkEndings() {
  if (state.phase === "ended") return true;

  if (state.spirits <= 0) {
    state.phase = "ended";
    state.ending = "spirits-loss";
    log("ending", "Exhaustion takes you. The path wins.");
    render();
    return true;
  }
  if (state.resistance <= 0) {
    state.phase = "ended";
    state.ending = "resistance-kill";
    log("ending", `Through on turn ${state.turn}. You made it.`);
    render();
    return true;
  }
  if (state.timers.length > 0 && state.timers.every(t => t.stopped)) {
    state.phase = "ended";
    state.ending = "control-kill";
    log("ending", `All hazards neutralized on turn ${state.turn}. Safe passage.`);
    render();
    return true;
  }
  return false;
}

// --- Helpers ---

function log(type, text) { state.log.push({ type, text }); }

// --- Render ---

function render() {
  const g = $("#game");
  g.innerHTML = "";

  g.appendChild(el("h1", null, "Traverse Prototype"));
  g.appendChild(el("div", "subtitle", "Plan the path. Afford the path. Survive the path."));

  if (state.phase === "setup") return renderSetup(g);
  renderPlay(g);
}

function renderSetup(g) {
  g.appendChild(el("div", "section-label", "Difficulty"));
  const actions = el("div", "actions");
  for (const d of DIFFICULTIES) {
    const btn = el("button", null,
      `<strong>${d.label}</strong><br><span style="font-size:14px;color:#8a7a5a">${d.desc}</span>`);
    btn.onclick = () => startTraverse(d);
    actions.appendChild(btn);
  }
  g.appendChild(actions);
}

function renderPlay(g) {
  const ended = state.phase === "ended";

  // stats
  const stats = el("div", "stats-bar");
  for (const s of [
    { key: "momentum", label: "Momentum", cls: "stat-momentum" },
    { key: "spirits",    label: "Spirits",    cls: "stat-spirits" },
    { key: "resistance", label: "Resistance", cls: "stat-resistance" },
  ]) {
    const d = el("div", `stat ${s.cls}`);
    d.innerHTML = `<div class="stat-label">${s.label}</div><div class="stat-value">${state[s.key]}</div>`;
    stats.appendChild(d);
  }
  g.appendChild(stats);

  g.appendChild(el("div", "turn-counter", `Turn ${state.turn} — Traverse`));

  // timers
  const timersDiv = el("div", "timers-section");
  timersDiv.appendChild(el("div", "section-label", "Hazards"));
  for (const t of state.timers) {
    const td = el("div", `timer${t.stopped ? ' stopped' : ''}`);
    const left = el("div", "timer-left");
    left.innerHTML = `<div class="timer-name">${t.stopped ? '&#10005; ' : ''}${t.name}</div>` +
      `<div class="timer-effect">${t.stopped ? 'Neutralized' :
        (t.effect === 'spirits' ? `-${t.amount} Spirits when it fires` : `+${t.amount} Resistance when it fires`)}</div>`;
    td.appendChild(left);
    if (!t.stopped) {
      const cd = el("div", "timer-countdown");
      for (let i = 0; i < t.countdown; i++) {
        cd.appendChild(el("div", `timer-pip${i < t.current ? ' filled' : ''}`));
      }
      td.appendChild(cd);
    }
    timersDiv.appendChild(td);
  }
  g.appendChild(timersDiv);

  // bonus openings (from Press/Force last turn)
  const hasBonus = state.bonusOpenings && state.bonusOpenings.length > 0;
  if (hasBonus) {
    const bonusDiv = el("div", "queue-section");
    bonusDiv.appendChild(el("div", "queue-label-current", "Choose an opening"));
    state.bonusOpenings.forEach((o, i) => {
      const card = el("div", "queue-card current");
      const info = el("div", "queue-info");
      info.innerHTML =
        `<div class="queue-name">${o.name}</div>` +
        `<div class="queue-detail">` +
          `<span class="queue-cost">${costLabel(o.cost)}</span>` +
          `<span class="queue-effect">${effectLabel(o.effect)}</span>` +
        `</div>`;
      card.appendChild(info);
      if (!ended) {
        const btn = el("button", "primary", "Take");
        btn.disabled = !canAfford(o);
        btn.onclick = () => takeBonusOpening(i);
        card.appendChild(btn);
      }
      bonusDiv.appendChild(card);
    });
    g.appendChild(bonusDiv);
  }

  // queue
  const queueDiv = el("div", "queue-section");
  state.queue.forEach((o, i) => {
    if (i === 0 && !hasBonus) {
      queueDiv.appendChild(el("div", "queue-label-current", "Current position"));
    } else if (i === 0 && hasBonus) {
      queueDiv.appendChild(el("div", "queue-label-upcoming", "Ahead (queue paused)"));
    } else if (i === 1) {
      queueDiv.appendChild(el("div", "queue-label-upcoming", "Ahead"));
    }

    const isCurrent = i === 0 && !hasBonus;
    const card = el("div", `queue-card ${isCurrent ? 'current' : 'future'}`);

    const pos = el("div", "queue-pos", isCurrent ? "\u25B6" : `${hasBonus ? i + 1 : i}`);
    card.appendChild(pos);

    const info = el("div", "queue-info");
    info.innerHTML =
      `<div class="queue-name">${o.name}</div>` +
      `<div class="queue-detail">` +
        `<span class="queue-cost">${costLabel(o.cost)}</span>` +
        `<span class="queue-effect">${effectLabel(o.effect)}</span>` +
      `</div>`;
    card.appendChild(info);

    if (isCurrent && !ended) {
      const btn = el("button", "primary", "Take");
      btn.disabled = !canAfford(o);
      btn.onclick = takeFront;
      card.appendChild(btn);
    }

    queueDiv.appendChild(card);
  });
  g.appendChild(queueDiv);

  // log
  const logDiv = el("div", "log");
  for (const entry of state.log) {
    logDiv.appendChild(el("div", `log-entry log-${entry.type}`, entry.text));
  }
  g.appendChild(logDiv);
  setTimeout(() => logDiv.scrollTop = logDiv.scrollHeight, 0);

  // actions (hidden during bonus pick — you already committed)
  if (!ended && !hasBonus) {
    const actions = el("div", "actions");
    const row = el("div", "action-row");

    const convertBtn = el("button", null,
      "Press the Advantage <span style='font-size:13px;color:#8a7a5a'>(-2 Mom &rarr; 3 openings next turn)</span>");
    convertBtn.disabled = state.momentum < 2;
    convertBtn.onclick = doPress;
    row.appendChild(convertBtn);

    const destBtn = el("button", null,
      "Force an Opening <span style='font-size:13px;color:#8a7a5a'>(-2 Spr &rarr; 3 openings next turn)</span>");
    destBtn.disabled = state.spirits < 2;
    destBtn.onclick = doForce;
    row.appendChild(destBtn);

    actions.appendChild(row);
    g.appendChild(actions);
  }

  // ended
  if (ended) {
    const row = el("div", "action-row");
    row.style.marginTop = "12px";
    const btn = el("button", "primary", "New Traverse");
    btn.onclick = newGame;
    row.appendChild(btn);
    g.appendChild(row);
  }
}

newGame();
</script>
</body>
</html>
